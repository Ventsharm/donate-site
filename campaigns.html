<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GiftMe Campaigns</title><style>#build-tag{display:none!important;}div:has(> span:contains("build")){display:none!important;}:root{--bg:#f4f1ff;--text:#171426;--muted:#665f7a}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#efe9ff 0,#f7f5ff 42%,#fff 100%);color:var(--text)}.wrap{padding:20px;max-width:680px;margin:0 auto}.hero{background:linear-gradient(135deg,#6d4fe8,#b697ff);color:#fff;padding:34px 22px;border-radius:28px;margin:12px 0 18px;text-align:center;box-shadow:0 18px 45px rgba(118,87,234,.22)}.hero h1{margin:0;font-size:38px;line-height:1;font-weight:950;letter-spacing:-1px}.hero p{margin:10px 0 0;color:rgba(255,255,255,.92);font-weight:700}.card{background:#fff;border-radius:28px;padding:20px;box-shadow:0 18px 55px rgba(75,56,160,.14)}.item{display:block;text-decoration:none;color:#fff;background:linear-gradient(135deg,#6d4fe8,#b697ff);border-radius:22px;padding:17px 18px;margin:12px 0;font-weight:950;font-size:18px;box-shadow:0 12px 32px rgba(118,87,234,.22)}.empty{padding:16px;border-radius:20px;background:#f7f4ff;color:var(--muted);font-weight:850;text-align:center}.btn{display:block;text-align:center;text-decoration:none;width:100%;padding:16px;border-radius:22px;border:0;font-size:18px;font-weight:950;margin-top:14px;background:#f1edff;color:#3d2d87}</style></head><body><div class="wrap"><div class="hero"><h1>Campaigns ✓</h1><p>All public campaign links</p></div><div class="card"><div id="list"><div class="empty">Loading campaigns…</div></div><a class="btn" href="./">Back</a></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";const app=initializeApp({apiKey:"AIzaSyBMZo5HOStyDEINl2xLm-M9X4PaDc-raBQ",authDomain:"donate-app-ff07c.firebaseapp.com",projectId:"donate-app-ff07c",storageBucket:"donate-app-ff07c.firebasestorage.app",messagingSenderId:"950201336557",appId:"1:950201336557:web:e8bdfa02d99512051f82e4"});const db=getFirestore(app),list=document.getElementById("list"),base=location.origin+"/donate-site/";function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}function urlFor(x){return x.slug?base+encodeURIComponent(x.slug):base+"?c="+encodeURIComponent(x.uid)}async function load(){try{const snap=await getDoc(doc(db,"publicCampaignDirectory","all"));const items=snap.exists()?(snap.data()?.items||{}):{};const rows=Object.keys(items).map(k=>items[k]).filter(x=>x&&x.uid&&x.title).sort((a,b)=>String(a.title).localeCompare(String(b.title)));if(!rows.length){list.innerHTML='<div class="empty">No campaigns are listed yet.</div>';return}list.innerHTML=rows.map(x=>'<a class="item" href="'+esc(urlFor(x))+'">'+esc(x.title)+'</a>').join("")}catch(e){list.innerHTML='<div class="empty">Could not load campaigns.</div>'}}load();</script></body></html>
