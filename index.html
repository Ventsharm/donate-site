<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GiftMe</title>
<style>
:root{--bg:#f3f6ff;--card:#fff;--text:#171426;--muted:#665f7a;--purple:#7657ea;--purple2:#b697ff}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#efe9ff 0,#f7f5ff 42%,#fff 100%);color:var(--text)}
.wrap{padding:20px;max-width:680px;margin:0 auto}
.header{background:linear-gradient(135deg,#6d4fe8,#b697ff);color:#fff;padding:34px 22px;border-radius:28px;margin:12px 0 18px;text-align:center;font-size:36px;font-weight:950;box-shadow:0 18px 45px rgba(118,87,234,.22)}
.card{background:#fff;border-radius:28px;padding:24px;box-shadow:0 18px 55px rgba(75,56,160,.14);margin-bottom:18px}
h1,h2{margin:0 0 16px;font-weight:950;letter-spacing:-.8px}
p{color:var(--muted);font-weight:650;line-height:1.5}
label{display:block;margin:12px 0 8px;font-weight:900}
.in{width:100%;padding:15px 16px;border-radius:18px;border:1px solid rgba(26,20,50,.16);background:#fff;font-size:17px;outline:none}
textarea.in{min-height:140px;resize:vertical;font-family:inherit;line-height:1.45}
.btn{width:100%;padding:16px;border-radius:22px;border:0;font-size:18px;font-weight:950;margin-top:12px;cursor:pointer}
.btnPrimary{background:#000;color:#fff}
.btnGhost{background:#f1edff;color:#3d2d87}
.btnGreen{background:linear-gradient(135deg,#6d4fe8,#b697ff);color:#fff}
.msg{display:none;margin:12px 0;padding:13px 14px;border-radius:16px;font-weight:900}
.msg.ok{display:block;background:#ecfff4;color:#0f6b2f}
.msg.err{display:block;background:#fff1f2;color:#9f1239}
.publicAbout{white-space:pre-wrap;color:#3d3653;font-weight:650}
.donateBox{margin-top:18px;border:1px solid rgba(118,87,234,.14);border-radius:24px;padding:18px}
.small{font-size:13px;color:#756d87;margin-top:8px}
.topBtns{display:flex;gap:10px;flex-wrap:wrap}
.topBtns .btn{flex:1;min-width:180px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">GiftMe</div>

<div id="msg" class="msg"></div>

<div id="loginWrap" class="card" style="display:none">
<h1>Sign in</h1>
<label>Email</label>
<input id="email" class="in" type="email" autocomplete="email" placeholder="you@email.com">
<label>Password</label>
<input id="password" class="in" type="password" autocomplete="current-password" placeholder="••••••••">
<button id="loginBtn" class="btn btnPrimary">Login</button>
<button id="viewAllFromLoginBtn" class="btn btnGhost">View all campaigns</button>
</div>

<div id="editorWrap" class="card" style="display:none">
<h1>Your campaign</h1>
<label>Campaign title</label>
<input id="title" class="in" placeholder="Campaign title">
<label>About your campaign</label>
<textarea id="about" class="in" placeholder="About your campaign"></textarea>
<button id="saveBtn" class="btn btnPrimary">Save campaign</button>
<button id="copyBtn" class="btn btnGhost">Copy public link</button>
<button id="viewBtn" class="btn btnGhost">View campaign</button>
<button id="viewAllCampaignsBtn" class="btn btnGhost">View all campaigns</button>
<button id="logoutBtn" class="btn btnGhost">Logout</button>
</div>

<div id="publicWrap" class="card" style="display:none">
<h1 id="publicTitle">Campaign</h1>
<div id="publicAbout" class="publicAbout"></div>
<div class="donateBox">
<h2>Donate</h2>
<p>Enter an amount, then pay securely.</p>
<label>Amount (£)</label>
<input id="donationAmount" class="in" inputmode="decimal" placeholder="e.g. 7.50">
<button id="donateBtn" class="btn btnGreen">Donate</button>
<div class="small">Payments are processed securely by Stripe.</div>
</div>
<button id="backBtn" class="btn btnGhost">Back</button>
</div>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyBMZo5HOStyDEINl2xLm-M9X4PaDc-raBQ",
authDomain:"donate-app-ff07c.firebaseapp.com",
projectId:"donate-app-ff07c",
storageBucket:"donate-app-ff07c.firebasestorage.app",
messagingSenderId:"950201336557",
appId:"1:950201336557:web:e8bdfa02d99512051f82e4"
});

const auth=getAuth(app);
const db=getFirestore(app);

const CREATE_DONATION_CHECKOUT_URL="https://europe-west2-donate-app-ff07c.cloudfunctions.net/createDonationCheckout";

const $=id=>document.getElementById(id);
const loginWrap=$("loginWrap"),editorWrap=$("editorWrap"),publicWrap=$("publicWrap"),msg=$("msg");
const params=new URLSearchParams(location.search);
const campaignId=params.get("c");

function baseUrl(){return location.origin+"/donate-site/"}
function publicUrl(uid){return baseUrl()+"?c="+encodeURIComponent(uid)}
function showMsg(t,type="ok"){msg.textContent=t;msg.className="msg "+type}
function clearMsg(){msg.textContent="";msg.className="msg"}
function showOnly(which){
loginWrap.style.display=which==="login"?"block":"none";
editorWrap.style.display=which==="editor"?"block":"none";
publicWrap.style.display=which==="public"?"block":"none";
}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}

async function loadPublicCampaign(id){
showOnly("public");
clearMsg();
try{
const snap=await getDoc(doc(db,"campaigns",id));
if(!snap.exists()){
$("publicTitle").textContent="Campaign not found";
$("publicAbout").textContent="";
document.querySelector(".donateBox").style.display="none";
showMsg("This campaign was not found.","err");
return;
}
const d=snap.data()||{};
$("publicTitle").textContent=d.title||"Campaign";
$("publicAbout").textContent=d.raisingFor||d.about||d.description||"";
document.querySelector(".donateBox").style.display="block";
}catch(e){
$("publicTitle").textContent="Campaign not found";
document.querySelector(".donateBox").style.display="none";
showMsg("Could not load campaign.","err");
}
}

async function loadEditor(user){
showOnly("editor");
clearMsg();
const snap=await getDoc(doc(db,"campaigns",user.uid));
if(snap.exists()){
const d=snap.data()||{};
$("title").value=d.title||"";
$("about").value=d.raisingFor||d.about||d.description||"";
}else{
$("title").value="";
$("about").value="";
}
}

$("loginBtn").onclick=async()=>{
try{
clearMsg();
await signInWithEmailAndPassword(auth,$("email").value.trim(),$("password").value);
}catch(e){showMsg("Login failed. Please check your details.","err")}
};

$("saveBtn").onclick=async()=>{
const user=auth.currentUser;
if(!user){showMsg("Not logged in.","err");return}
const title=$("title").value.trim();
const about=$("about").value.trim();
if(!title||!about){showMsg("Please fill in your campaign title and about section.","err");return}
await setDoc(doc(db,"campaigns",user.uid),{title,about,raisingFor:about,updatedAt:Date.now()},{merge:true});
showMsg("Campaign saved ✅","ok");
};

$("copyBtn").onclick=async()=>{
const user=auth.currentUser;
if(!user){showMsg("Not logged in.","err");return}
const url=publicUrl(user.uid);
try{await navigator.clipboard.writeText(url);showMsg("Public link copied ✅","ok")}
catch(e){showMsg("Copy this link: "+url,"ok")}
};

$("viewBtn").onclick=()=>{
const user=auth.currentUser;
if(!user){showMsg("Not logged in.","err");return}
location.href=publicUrl(user.uid);
};

$("viewAllCampaignsBtn").onclick=()=>{location.href=baseUrl()+"campaigns.html"};
$("viewAllFromLoginBtn").onclick=()=>{location.href=baseUrl()+"campaigns.html"};
$("backBtn").onclick=()=>{location.href=baseUrl()};
$("logoutBtn").onclick=async()=>{await signOut(auth);location.href=baseUrl()};

function parseGBPToPence(s){
let t=String(s||"").trim().replace(/,/g,".");
if(!t)return 0;
if(!/^\\d+(\\.\\d{1,2})?$/.test(t))return NaN;
const parts=t.split(".");
return(parseInt(parts[0]||"0",10)||0)*100+(parseInt((parts[1]||"0").padEnd(2,"0").slice(0,2),10)||0);
}

async function fetchJson(url,bodyObj){
const res=await fetch(url,{method:"POST",mode:"cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(bodyObj||{})});
const text=await res.text();
let data=null;
try{data=text?JSON.parse(text):null}catch(_){}
return{res,data,text};
}

async function postSmartPublic(url,payload){
let out=await fetchJson(url,payload);
if(out.res.ok){const d=out.data||{};return{url:d.url||d?.result?.url||""}}
let msg=((out.data&&(out.data.error||out.data.message))?String(out.data.error||out.data.message):("HTTP "+out.res.status))||"Error";
if(String(msg).toLowerCase().includes("missing")||String(msg).toLowerCase().includes("data")||out.res.status===400||out.res.status===500){
out=await fetchJson(url,{data:payload||{}});
if(out.res.ok){const d=out.data||{};return{url:d.url||d?.result?.url||""}}
}
throw new Error(msg);
}

$("donateBtn").onclick=async()=>{
try{
const p=parseGBPToPence($("donationAmount").value);
if(!isFinite(p)||p<=0){showMsg("Enter a valid amount.","err");return}
const here=location.href;
const payload={amount:p,amount_pence:p,donationAmount:p,currency:"gbp",currencyCode:"gbp",campaignId:campaignId,campaignUid:campaignId,creatorUid:campaignId,uid:campaignId,successUrl:here,cancelUrl:here,returnUrl:here,success_url:here,cancel_url:here,return_url:here};
const r=await postSmartPublic(CREATE_DONATION_CHECKOUT_URL,payload);
if(!r.url)throw new Error("No checkout URL returned");
location.href=r.url;
}catch(e){showMsg("Checkout error. Please try again.","err")}
};

if(campaignId){
loadPublicCampaign(campaignId);
}else{
onAuthStateChanged(auth,user=>{
if(user)loadEditor(user);
else showOnly("login");
});
}
</script>
</body>
</html>
